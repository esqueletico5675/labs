<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Taller — Tablero de tu vehículo</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icono.svg" type="image/svg+xml">
  <meta name="theme-color" content="#0b0f16">
  <style>
    /* =====================================================
       DISEÑO: "tablero de instrumentos" (cabina de camión).
       Cada mantenimiento es un MEDIDOR radial, como los
       relojes del tablero: la aguja sube a medida que el
       componente se desgasta. El km de hoy es un odómetro.
       Colores de estado validados para daltonismo y
       contraste sobre esta superficie oscura; el estado
       nunca depende SOLO del color (siempre icono + texto).
       ===================================================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --fondo: #0b0f16;          /* la cabina */
      --panel: #10161f;          /* superficie de los paneles */
      --borde: #1f2937;
      --tinta: #e6edf5;          /* texto principal */
      --tinta2: #94a3b8;         /* texto secundario */
      --ok: #059669;             /* al día */
      --alerta: #d97706;         /* próximo */
      --critico: #ef4444;        /* vencido */
      --lcd: #f59e0b;            /* dígitos del odómetro (ámbar LED) */
    }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 500px at 50% -10%, #131c2b 0%, var(--fondo) 60%);
      color: var(--tinta); min-height: 100vh;
    }

    /* ---- cabecera: placa del taller + interruptor de avisos ---- */
    header {
      display: flex; align-items: center; justify-content: space-between;
      gap: .75rem; padding: 1rem 1.1rem; max-width: 680px; margin: 0 auto;
    }
    header .marca h1 { font-size: 1.05rem; letter-spacing: .06em; text-transform: uppercase; }
    header .marca p { font-size: .8rem; color: var(--tinta2); margin-top: .1rem; }

    /* interruptor tipo cabina para las notificaciones */
    #btn-avisos {
      display: none; align-items: center; gap: .5rem;
      background: var(--panel); color: var(--tinta);
      border: 1px solid var(--borde); border-radius: 999px;
      padding: .45rem .85rem; font-size: .8rem; cursor: pointer;
    }
    #btn-avisos .led {
      width: .6rem; height: .6rem; border-radius: 50%;
      background: #374151; box-shadow: none;
    }
    #btn-avisos.activo .led {
      background: var(--ok);
      box-shadow: 0 0 6px 1px rgba(5,150,105,.8);
    }

    main { padding: 0 1rem 2.5rem; max-width: 680px; margin: 0 auto; }

    /* ---- panel por vehículo ---- */
    .cluster {
      background: linear-gradient(180deg, #131b27 0%, var(--panel) 22%);
      border: 1px solid var(--borde); border-radius: 16px;
      padding: 1.1rem 1rem 1.25rem; margin-bottom: 1.25rem;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .cluster-cabeza {
      display: flex; align-items: center; justify-content: space-between;
      gap: .75rem; flex-wrap: wrap; margin-bottom: 1rem;
    }
    .modelo { font-size: .95rem; color: var(--tinta2); }
    .modelo b { color: var(--tinta); font-size: 1.05rem; display: block; }

    /* placa colombiana: amarilla con marco negro */
    .placa {
      background: #f2c500; color: #111;
      font-family: ui-monospace, Consolas, monospace; font-weight: 700;
      font-size: 1.05rem; letter-spacing: .12em;
      padding: .3rem .7rem; border-radius: 6px;
      border: 2px solid #111; box-shadow: inset 0 0 0 2px #f2c500, 0 2px 4px rgba(0,0,0,.4);
    }

    /* ---- odómetro (km estimado de HOY) ---- */
    .odometro {
      background: #05070b; border: 1px solid #1c2431; border-radius: 10px;
      padding: .7rem .9rem; margin-bottom: 1.1rem;
      display: flex; align-items: baseline; justify-content: space-between; gap: .75rem;
    }
    .odometro .digitos {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 1.7rem; font-weight: 700; letter-spacing: .18em;
      color: var(--lcd); text-shadow: 0 0 10px rgba(245,158,11,.45);
    }
    .odometro .leyenda { font-size: .72rem; color: var(--tinta2); text-align: right; line-height: 1.3; }

    /* ---- rejilla de medidores ---- */
    .medidores {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: .75rem;
    }
    .medidor {
      background: rgba(255,255,255,.02);
      border: 1px solid var(--borde); border-radius: 12px;
      padding: .7rem .5rem .75rem; text-align: center;
    }
    .medidor svg { width: 104px; height: 74px; }
    .medidor .nombre {
      font-size: .78rem; line-height: 1.25; min-height: 2em;
      margin-top: .3rem; color: var(--tinta);
    }
    .medidor .dato { font-size: .7rem; color: var(--tinta2); margin-top: .15rem; }

    /* chip de estado: SIEMPRE icono + palabra (nunca solo color) */
    .chip {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .68rem; font-weight: 700; letter-spacing: .04em;
      padding: .18rem .55rem; border-radius: 999px; margin-top: .4rem;
      text-transform: uppercase;
    }
    .chip.vencido { background: rgba(239,68,68,.14); color: #fca5a5; border: 1px solid rgba(239,68,68,.5); }
    .chip.proximo { background: rgba(217,119,6,.14); color: #fcd34d; border: 1px solid rgba(217,119,6,.5); }
    .chip.al_dia  { background: rgba(5,150,105,.14); color: #6ee7b7; border: 1px solid rgba(5,150,105,.5); }

    /* ---- formulario de cita (MVP cliente) ---- */
    .cita-form { display: grid; gap: .6rem; margin-top: .7rem; }
    .cita-form label { font-size: .78rem; color: var(--tinta2); display: grid; gap: .3rem; }
    .cita-form input {
      width: 100%; background: #0d1119; color: var(--tinta);
      border: 1px solid var(--borde); border-radius: 8px;
      padding: .6rem .7rem; min-height: 44px; font: inherit;
      color-scheme: dark;   /* el calendario del navegador sale oscuro */
    }
    .cita-form button {
      background: #2563eb; color: #fff; border: none; border-radius: 10px;
      padding: .65rem 1rem; min-height: 44px; font: inherit; font-weight: 600;
      cursor: pointer;
    }
    .cita-form button:hover { filter: brightness(1.15); }

    /* ---- bitácora (historial) tipo tiquete de taller ---- */
    details { margin-top: 1rem; }
    summary {
      cursor: pointer; font-size: .82rem; color: var(--tinta2);
      letter-spacing: .05em; text-transform: uppercase;
    }
    .bitacora {
      margin-top: .6rem; background: #0d1119; border: 1px dashed #273244;
      border-radius: 10px; padding: .7rem .85rem;
      font-family: ui-monospace, Consolas, monospace; font-size: .78rem;
      color: var(--tinta2); line-height: 1.7;
    }
    .bitacora b { color: var(--tinta); font-weight: 600; }

    /* ---- pantalla de entrada (pedir código) ---- */
    .aviso {
      background: var(--panel); border: 1px solid var(--borde);
      border-radius: 16px; padding: 1.6rem 1.2rem; text-align: center;
      color: var(--tinta2); margin-top: 1rem;
    }
    .aviso input {
      width: 100%; padding: .65rem .8rem; margin-top: .9rem;
      background: #0d1119; color: var(--tinta);
      border: 1px solid #273244; border-radius: 8px; font-size: 1rem;
    }
    .aviso button {
      margin-top: .75rem; width: 100%; padding: .7rem;
      background: #1d4ed8; color: white; border: none;
      border-radius: 8px; font-size: 1rem; cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <div class="marca">
      <h1 id="titulo">Mi Taller</h1>
      <p id="saludo">Tablero de tu vehículo</p>
    </div>
    <button id="btn-avisos" onclick="alternarAvisos()">
      <span class="led"></span><span id="btn-avisos-texto">Avisos</span>
    </button>
  </header>
  <main id="contenido">
    <div class="aviso">Encendiendo el tablero…</div>
  </main>
  <footer style="max-width:680px;margin:0 auto;padding:0 1rem 2rem;text-align:center;">
    <a href="privacidad.html" style="color:#94a3b8;font-size:.75rem;">
      Política de tratamiento de datos personales
    </a>
  </footer>

  <script>
    const parametros = new URLSearchParams(location.search);
    let token = parametros.get("t") || localStorage.getItem("token_portal");
    let clavePublicaPush = null;

    const contenido = document.getElementById("contenido");
    const ETIQUETAS = { vencido: "Vencido", proximo: "Próximo", al_dia: "Al día" };
    const ICONOS    = { vencido: "⚠", proximo: "!", al_dia: "✓" };
    const COLORES   = { vencido: "#ef4444", proximo: "#d97706", al_dia: "#059669" };

    // -----------------------------------------------------
    // El MEDIDOR radial (SVG): un arco de 220° como los
    // relojes del tablero. `fraccion` = qué tanto del
    // intervalo ya se consumió (0 = recién hecho, 1 = tocaba ya).
    // -----------------------------------------------------
    function medidor(fraccion, estado) {
      const color = COLORES[estado];
      const cx = 52, cy = 58, r = 40;
      const inicio = 200, barrido = 140;           // de 200° a 340° (arco superior)
      const angulo = inicio + barrido * Math.min(Math.max(fraccion, 0), 1);
      const punto = (grados, radio) => {
        const rad = grados * Math.PI / 180;
        return `${cx + radio * Math.cos(rad)},${cy + radio * Math.sin(rad)}`;
      };
      const arco = (desde, hasta, radio) =>
        `M ${punto(desde, radio)} A ${radio} ${radio} 0 ${hasta - desde > 180 ? 1 : 0} 1 ${punto(hasta, radio)}`;

      // marcas del dial (cada 20% del recorrido)
      let marcas = "";
      for (let i = 0; i <= 5; i++) {
        const g = inicio + barrido * i / 5;
        marcas += `<line x1="${punto(g, r + 1).split(",")[0]}" y1="${punto(g, r + 1).split(",")[1]}"
                         x2="${punto(g, r - 4).split(",")[0]}" y2="${punto(g, r - 4).split(",")[1]}"
                         stroke="#334155" stroke-width="2"/>`;
      }
      return `
        <svg viewBox="0 0 104 74" role="img" aria-label="desgaste ${Math.round(fraccion * 100)}%">
          <path d="${arco(inicio, inicio + barrido, r)}" fill="none" stroke="#1f2937" stroke-width="7" stroke-linecap="round"/>
          <path d="${arco(inicio, Math.max(angulo, inicio + 0.5), r)}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"/>
          ${marcas}
          <line x1="${cx}" y1="${cy}" x2="${punto(angulo, r - 10).split(",")[0]}" y2="${punto(angulo, r - 10).split(",")[1]}"
                stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="${cx}" cy="${cy}" r="3.5" fill="${color}"/>
        </svg>`;
    }

    // Qué tanto del intervalo se consumió (toma el criterio MÁS urgente).
    function fraccionDesgaste(m) {
      const partes = [];
      if (m.intervalo_km && m.km_faltantes !== null)
        partes.push(1 - m.km_faltantes / m.intervalo_km);
      if (m.intervalo_meses && m.meses_faltantes !== null)
        partes.push(1 - m.meses_faltantes / m.intervalo_meses);
      return partes.length ? Math.max(...partes) : 0;
    }

    function textoFaltante(m) {
      if (m.estado === "vencido") {
        if (m.km_faltantes !== null && m.km_faltantes <= 0)
          return `pasado ${Math.abs(m.km_faltantes).toLocaleString("es-CO")} km`;
        return "ya tocaba por tiempo";
      }
      const partes = [];
      if (m.km_faltantes !== null) partes.push(`${m.km_faltantes.toLocaleString("es-CO")} km`);
      if (m.meses_faltantes !== null) partes.push(`${m.meses_faltantes} meses`);
      return partes.length ? "faltan " + partes.join(" o ") : "";
    }

    function pedirToken(mensaje) {
      contenido.innerHTML = `
        <div class="aviso">
          <p><b style="color:#e6edf5">Entra con tu cuenta</b></p>
          <input id="login-email" type="email" placeholder="Tu correo" autocomplete="username">
          <input id="login-clave" type="password" placeholder="Tu contraseña" autocomplete="current-password">
          <button onclick="entrarConClave()">Entrar</button>
          <p id="login-error" style="color:#fca5a5;font-size:.8rem;min-height:1em;margin-top:.5rem;"></p>

          <button onclick="mostrarCrearCuenta()" id="btn-ir-crear"
                  style="background:none;border:none;color:#93c5fd;text-decoration:underline;
                         font-size:.82rem;cursor:pointer;padding:.4rem;">
            ¿Primera vez? Crea tu cuenta con el código del taller
          </button>

          <!-- crear cuenta: código del taller + contraseña nueva -->
          <div id="zona-crear" style="display:none;">
            <hr style="border:none;border-top:1px solid #1f2937;margin:1rem 0;">
            <p style="font-size:.8rem;"><b style="color:#e6edf5">Crear mi cuenta</b><br>
            El taller te dio un código (o un enlace que lo contiene). Pégalo y elige tu contraseña:</p>
            <input id="crear-token" placeholder="Código que te dio el taller">
            <input id="crear-clave" type="password" placeholder="Tu contraseña (mínimo 6)" autocomplete="new-password">
            <input id="crear-clave2" type="password" placeholder="Repite la contraseña" autocomplete="new-password">
            <button onclick="crearCuenta()">Crear cuenta y entrar</button>
            <p id="crear-error" style="color:#fca5a5;font-size:.8rem;min-height:1em;margin-top:.5rem;"></p>
          </div>

          <hr style="border:none;border-top:1px solid #1f2937;margin:1rem 0;">
          <p style="font-size:.8rem;">${mensaje}</p>
          <input id="campo-token" placeholder="Pega aquí tu código de acceso">
          <button onclick="usarToken()">Encender tablero</button>
        </div>`;
    }

    function mostrarCrearCuenta() {
      document.getElementById("zona-crear").style.display = "";
      document.getElementById("btn-ir-crear").style.display = "none";
      document.getElementById("crear-token").focus();
    }

    // Crea la cuenta: valida el código, guarda la contraseña y entra directo.
    async function crearCuenta() {
      const error = document.getElementById("crear-error");
      let codigo = document.getElementById("crear-token").value.trim();
      const clave = document.getElementById("crear-clave").value;
      const clave2 = document.getElementById("crear-clave2").value;
      // si pegó el enlace completo en vez del código, sacamos el código solo
      if (codigo.includes("t=")) codigo = codigo.split("t=")[1].split("&")[0];
      if (!codigo) { error.textContent = "Pega el código que te dio el taller."; return; }
      if (clave.length < 6) { error.textContent = "La contraseña necesita mínimo 6 caracteres."; return; }
      if (clave !== clave2) { error.textContent = "Las contraseñas no coinciden."; return; }
      try {
        const r = await fetch(`/portal/${encodeURIComponent(codigo)}/clave`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ clave }),
        });
        const datos = await r.json();
        if (!r.ok) {
          error.textContent = r.status === 404
            ? "Ese código no es válido. Verifícalo con tu taller."
            : (datos.detail || "No se pudo crear la cuenta.");
          return;
        }
        // cuenta creada: entramos de una con el mismo código
        location.search = "?t=" + encodeURIComponent(codigo);
      } catch { error.textContent = "Sin conexión. Intenta de nuevo."; }
    }
    function usarToken() {
      const valor = document.getElementById("campo-token").value.trim();
      if (valor) location.search = "?t=" + encodeURIComponent(valor);
    }

    // MVP: login con correo + contraseña. El servidor devuelve el mismo
    // token del portal, así que el resto de la app no cambia en nada.
    async function entrarConClave() {
      const email = document.getElementById("login-email").value.trim();
      const clave = document.getElementById("login-clave").value;
      const error = document.getElementById("login-error");
      if (!email || !clave) { error.textContent = "Escribe correo y contraseña."; return; }
      try {
        const r = await fetch("/portal-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, clave }),
        });
        const datos = await r.json();
        if (!r.ok) { error.textContent = datos.detail || "No se pudo entrar."; return; }
        location.search = "?t=" + encodeURIComponent(datos.token_acceso);
      } catch { error.textContent = "Sin conexión. Intenta de nuevo."; }
    }

    async function cargar() {
      if (!token) { pedirToken("Pídele a tu taller el enlace de acceso, o pega tu código:"); return; }
      try {
        const r = await fetch("/portal/" + encodeURIComponent(token));
        if (!r.ok) {
          localStorage.removeItem("token_portal");
          pedirToken("El código no es válido. Verifícalo con tu taller:");
          return;
        }
        const datos = await r.json();
        localStorage.setItem("token_portal", token);
        clavePublicaPush = datos.push_clave_publica;
        pintar(datos);
        cargarCitas();
        prepararAvisos();
      } catch (e) {
        contenido.innerHTML = `<div class="aviso">Sin conexión. Intenta cuando tengas internet.</div>`;
      }
    }

    function pintar(datos) {
      document.getElementById("titulo").textContent = datos.taller || "Mi Taller";
      document.getElementById("saludo").textContent = "Hola, " + datos.cliente;

      if (!datos.vehiculos.length) {
        contenido.innerHTML = `<div class="aviso">Aún no tienes vehículos registrados.</div>`;
        return;
      }

      contenido.innerHTML = datos.vehiculos.map(v => {
        const kmHoy = v.mantenimientos[0]?.km_estimado ?? v.km_registrado;
        return `
        <section class="cluster">
          <div class="cluster-cabeza">
            <div class="modelo"><b>${[v.marca, v.modelo].filter(Boolean).join(" ") || "Vehículo"}</b>según tu taller</div>
            <div class="placa">${v.placa}</div>
          </div>

          <div class="odometro">
            <span class="digitos">${Math.round(kmHoy).toLocaleString("es-CO")}</span>
            <span class="leyenda">km estimados HOY<br>último registro: ${v.km_registrado.toLocaleString("es-CO")} km</span>
          </div>

          <div class="medidores">
            ${v.mantenimientos.map(m => `
              <div class="medidor">
                ${medidor(fraccionDesgaste(m), m.estado)}
                <div class="nombre">${m.tipo}</div>
                <div class="dato">${textoFaltante(m)}</div>
                <span class="chip ${m.estado}">${ICONOS[m.estado]} ${ETIQUETAS[m.estado]}</span>
              </div>`).join("")}
          </div>

          ${v.historial.length ? `
          <details>
            <summary>Bitácora de visitas (${v.historial.length})</summary>
            <div class="bitacora">
              ${v.historial.map(h =>
                `<div><b>${h.fecha}</b> · ${h.kilometraje.toLocaleString("es-CO")} km${h.descripcion ? " · " + h.descripcion : ""}</div>`
              ).join("")}
            </div>
          </details>` : ""}

          <!-- El dueño reporta el km real de su tablero (afina la estimación) -->
          <details class="cita">
            <summary>🔢 Actualizar mi kilometraje</summary>
            <div class="cita-form">
              <label>¿Cuántos km marca tu tablero?
                <input type="number" inputmode="numeric" id="km-valor-${v.vehiculo_id}" placeholder="Ej: 82500" min="0">
              </label>
              <button onclick="reportarKm(${v.vehiculo_id})">Guardar kilometraje</button>
              <p id="km-msj-${v.vehiculo_id}" style="font-size:.78rem;min-height:1em;"></p>
            </div>
          </details>

          <!-- MVP: pedir cita para ESTE vehículo -->
          <details class="cita">
            <summary>📅 Agendar cita para este vehículo</summary>
            <div class="cita-form">
              <label>¿Qué día te sirve?
                <input type="date" id="cita-fecha-${v.vehiculo_id}" min="${new Date().toISOString().slice(0,10)}">
              </label>
              <label>¿Qué le pasa o qué necesita? (opcional)
                <input id="cita-nota-${v.vehiculo_id}" placeholder="Ej: cambio de aceite, suena al frenar...">
              </label>
              <button onclick="pedirCita(${v.vehiculo_id})">Solicitar cita</button>
              <p id="cita-msj-${v.vehiculo_id}" style="font-size:.78rem;min-height:1em;"></p>
            </div>
          </details>
        </section>`;
      }).join("");

      // sección "mis citas" + cuenta (crear contraseña), al final
      contenido.innerHTML += `
        <section class="cluster" id="zona-citas" style="display:none;">
          <div class="cluster-cabeza"><div class="modelo"><b>Mis citas</b></div></div>
          <div id="lista-citas" class="bitacora" style="margin-top:0;"></div>
        </section>
        ${!datos.tiene_clave ? `
        <section class="cluster">
          <div class="cluster-cabeza"><div class="modelo"><b>Crea tu contraseña</b>y entra sin el enlace</div></div>
          ${datos.tiene_email ? `
          <div class="cita-form">
            <input type="password" id="clave-nueva" placeholder="Contraseña (mínimo 6)" autocomplete="new-password">
            <button onclick="crearClave()">Guardar contraseña</button>
            <p id="clave-msj" style="font-size:.78rem;min-height:1em;"></p>
          </div>` : `
          <p style="font-size:.82rem;color:#94a3b8;">Pídele al taller que registre tu
          correo: será tu usuario para entrar.</p>`}
        </section>` : ""}`;
    }

    const ETIQUETA_CITA = { solicitada: "⏳ Esperando confirmación", confirmada: "✅ Confirmada",
                            atendida: "✔ Atendida", cancelada: "✖ Cancelada" };

    async function cargarCitas() {
      const r = await fetch(`/portal/${encodeURIComponent(token)}/citas`);
      if (!r.ok) return;
      const citas = await r.json();
      if (!citas.length) return;
      document.getElementById("zona-citas").style.display = "";
      document.getElementById("lista-citas").innerHTML = citas.map(c =>
        `<div><b>${c.fecha}</b> · ${c.placa} · ${ETIQUETA_CITA[c.estado] || c.estado}${c.nota ? " · " + c.nota : ""}` +
        (["solicitada", "confirmada"].includes(c.estado)
          ? ` · <a href="#" onclick="cancelarCita(${c.id});return false;" style="color:#ef4444;">Cancelar</a>`
          : "") +
        `</div>`
      ).join("");
    }

    async function cancelarCita(citaId) {
      if (!confirm("¿Cancelar esta cita? El taller quedará avisado.")) return;
      const r = await fetch(`/portal/${encodeURIComponent(token)}/citas/${citaId}`, {
        method: "DELETE",
      });
      if (r.ok) { cargarCitas(); cargar(); } // refresca citas y vehículos
      else {
        const datos = await r.json().catch(() => ({}));
        alert(datos.detail || "No se pudo cancelar la cita.");
      }
    }

    async function pedirCita(vehiculoId) {
      const fecha = document.getElementById("cita-fecha-" + vehiculoId).value;
      const nota = document.getElementById("cita-nota-" + vehiculoId).value.trim();
      const msj = document.getElementById("cita-msj-" + vehiculoId);
      if (!fecha) { msj.style.color = "#fca5a5"; msj.textContent = "Elige el día."; return; }
      const r = await fetch(`/portal/${encodeURIComponent(token)}/citas`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ vehiculo_id: vehiculoId, fecha, nota: nota || null }),
      });
      const datos = await r.json();
      msj.style.color = r.ok ? "#6ee7b7" : "#fca5a5";
      msj.textContent = r.ok ? datos.mensaje : (datos.detail || "No se pudo solicitar.");
      if (r.ok) cargarCitas();
    }

    async function reportarKm(vehiculoId) {
      const valor = document.getElementById("km-valor-" + vehiculoId).value;
      const msj = document.getElementById("km-msj-" + vehiculoId);
      const km = parseInt(valor, 10);
      if (isNaN(km)) { msj.style.color = "#fca5a5"; msj.textContent = "Escribe el número de tu odómetro."; return; }
      const r = await fetch(`/portal/${encodeURIComponent(token)}/kilometraje`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ vehiculo_id: vehiculoId, kilometraje: km }),
      });
      const datos = await r.json();
      msj.style.color = r.ok ? "#6ee7b7" : "#fca5a5";
      msj.textContent = r.ok ? datos.mensaje : (datos.detail || "No se pudo guardar.");
      if (r.ok) setTimeout(cargar, 1200); // recarga: el odómetro y los medidores se actualizan
    }

    async function crearClave() {
      const clave = document.getElementById("clave-nueva").value;
      const msj = document.getElementById("clave-msj");
      if (clave.length < 6) { msj.style.color = "#fca5a5"; msj.textContent = "Mínimo 6 caracteres."; return; }
      const r = await fetch(`/portal/${encodeURIComponent(token)}/clave`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ clave }),
      });
      const datos = await r.json();
      msj.style.color = r.ok ? "#6ee7b7" : "#fca5a5";
      msj.textContent = r.ok ? datos.mensaje : (datos.detail || "No se pudo guardar.");
    }

    // -----------------------------------------------------
    // NOTIFICACIONES PUSH: el interruptor "Avisos".
    // Solo aparece si el servidor tiene llaves configuradas
    // y el navegador soporta push.
    // -----------------------------------------------------
    function base64aBytes(cadena) {
      const relleno = "=".repeat((4 - cadena.length % 4) % 4);
      const crudo = atob((cadena + relleno).replace(/-/g, "+").replace(/_/g, "/"));
      return Uint8Array.from(crudo, c => c.charCodeAt(0));
    }

    async function prepararAvisos() {
      if (!clavePublicaPush || !("serviceWorker" in navigator) || !("PushManager" in window)) return;
      const boton = document.getElementById("btn-avisos");
      boton.style.display = "inline-flex";
      const registro = await navigator.serviceWorker.ready;
      const suscripcion = await registro.pushManager.getSubscription();
      actualizarBoton(!!suscripcion);
    }

    function actualizarBoton(activo) {
      const boton = document.getElementById("btn-avisos");
      boton.classList.toggle("activo", activo);
      document.getElementById("btn-avisos-texto").textContent =
        activo ? "Avisos ON" : "Activar avisos";
    }

    async function alternarAvisos() {
      const registro = await navigator.serviceWorker.ready;
      let suscripcion = await registro.pushManager.getSubscription();

      if (suscripcion) {
        // Apagar: avisamos al servidor y cancelamos en el navegador.
        await fetch(`/portal/${encodeURIComponent(token)}/push`, {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ endpoint: suscripcion.endpoint }),
        });
        await suscripcion.unsubscribe();
        actualizarBoton(false);
        return;
      }

      // Encender: pedir permiso, suscribirse y registrar en el servidor.
      const permiso = await Notification.requestPermission();
      if (permiso !== "granted") return;
      suscripcion = await registro.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: base64aBytes(clavePublicaPush),
      });
      const s = suscripcion.toJSON();
      await fetch(`/portal/${encodeURIComponent(token)}/push`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ endpoint: s.endpoint, p256dh: s.keys.p256dh, auth: s.keys.auth }),
      });
      actualizarBoton(true);
    }

    if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
    cargar();
  </script>
</body>
</html>
